name = "waichat"
main = "src/worker/index.ts"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

# Built React app served as static assets
[assets]
directory = "./dist"
# Enables Single Page Application routing (serves index.html for unknown routes like /c/cloud/123)
not_found_handling = "single-page-application"
# --- ROUTING ESCAPE HATCH ---
# Currently, Cloudflare smartly routes fetch() calls to the Hono backend without explicit config.
# It does this by reading request headers (like `Sec-Fetch-Mode: cors` or `Accept: application/json`)
# to differentiate between a human navigating to a URL and React fetching API data.
#
# IF THIS BREAKS IN THE FUTURE (e.g., /api/ requests start returning the React index.html file),
# uncomment the line below. This explicitly forces the edge network to run the Worker script
# for all API routes before checking the static assets folder.
#
# run_worker_first = ["/api/*"]

# Workers AI binding
[ai]
binding = "AI"

# Optional: set these as secrets via `wrangler secret put` for live model fetching
# or add to .env.local for local development
# [vars]
# CLOUDFLARE_ACCOUNT_ID = ""
# CLOUDFLARE_API_TOKEN = ""

# D1 Database
# Note: database_id is replaced automatically when deploying via the Deploy to Cloudflare button
[[d1_databases]]
binding = "DB"
database_name = "waichat-db"
database_id = ""
migrations_dir = "migrations"

# Auto-Update System
# Requires Cloudflare Workers Paid plan ($5/month) for Queue support.
# Set GITHUB_TOKEN secret via: wrangler secret put GITHUB_TOKEN
# Set GITHUB_REPO to "owner/repo" format for the user's deployed repo.

[vars]
GITHUB_REPO = ""

# Queue producer: sends update jobs from cron/manual check
[[queues.producers]]
queue = "waichat-update-queue"
binding = "UPDATE_QUEUE"

# Queue consumer: processes update jobs (fetch files, verify, commit)
[[queues.consumers]]
queue = "waichat-update-queue"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "waichat-update-dlq"

# Cron trigger: daily update check at 2:00 AM UTC
[triggers]
crons = ["0 2 * * *"]
